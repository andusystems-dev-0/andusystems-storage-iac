---
# ============================================================================
# PHASE 1 — bootstrap (runs before management ArgoCD has the workload up)
# Creates the nexus namespace + Jinja2-templated bootstrap secrets that the
# pod needs at first boot (admin password, MinIO credentials).
# ============================================================================
- name: Create nexus namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: nexus
  environment:
    KUBECONFIG: "{{ kubeconfig }}"

- name: Apply Manifest
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', repo_root + '/apps/nexus/manifest.yml') | from_yaml_all | list }}"
  environment:
    KUBECONFIG: "{{ kubeconfig }}"

# ============================================================================
# PHASE 2 — post-install configuration (runs after management ArgoCD has
# synced the storage-nexus Application and the pod is up).
#
# Re-running this phase is idempotent: each task GETs current state via the
# Nexus REST API and only PUT/POSTs if drift is detected. All API calls go
# through `kubectl exec` against the nexus pod's localhost:8081, which avoids
# DNS / TLS / Pangolin / cross-cluster routing concerns entirely.
#
# Replaces the manual UI clicks documented in apps/nexus/README.md
# steps 1-5 of the post-install setup section. The README's UI walkthrough
# is preserved as a fallback for when this role can't be re-run.
#
# WHY this is needed at all (the trap we hit live): Nexus's defaults for a
# fresh hosted docker repo set forceBasicAuth=true and don't include the
# DockerToken realm in the active list. The combination silently breaks
# `docker login` even with correct credentials, returning BASIC realm headers
# instead of Bearer realm headers. Worth automating once.
# ============================================================================

- name: post-install | Resolve nexus pod name
  command: >
    kubectl -n nexus get pod -l app.kubernetes.io/name=nexus
    -o jsonpath={.items[0].metadata.name}
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: nexus_pod
  changed_when: false
  retries: 60
  delay: 10
  # The pod might not exist yet on first deploy if management ArgoCD hasn't
  # finished syncing yet. Retry for up to 10 minutes.
  until: nexus_pod.rc == 0 and nexus_pod.stdout != ""

- name: post-install | Wait for Nexus REST API to respond
  # /service/rest/v1/status is the anonymous health endpoint — no auth needed,
  # so this task is credential-free. The retry loop tolerates the postStart
  # hook still working through the random→bootstrap admin-password handover
  # in the background; subsequent tasks will use the bootstrap password via
  # the curl config file written next.
  command: >
    kubectl -n nexus exec {{ nexus_pod.stdout }} --
    curl -sf -o /dev/null
    http://localhost:8081/service/rest/v1/status
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: nexus_api_ready
  changed_when: false
  retries: 60
  delay: 10
  until: nexus_api_ready.rc == 0

# --- Phase 2 wrapper with guaranteed credential cleanup --------------------
# All tasks that touch the Nexus REST API live in post_install.yml. They are
# imported here inside a `block:` whose `always:` wipes the credential temp
# files in the pod, so the admin password and any user passwords cannot
# persist on the pod's container rootfs after the role exits — even if a
# downstream task fails midway through.
#
# Cleanup notes:
# - /tmp/nexus-curl.conf      contains the admin password in curl -K format
#   (mode 0600 inside the pod). Created by the cred-stash task at the top of
#   post_install.yml; deleted unconditionally by the always handler.
# - /tmp/nexus-user-body.json holds the JSON body for create-user calls
#   (contains user passwords). Each create-user task already removes it via
#   an in-pod `trap rm` on shell exit, but the always handler also tries the
#   delete to defend against the trap not firing (e.g. shell killed mid-call).
# - /tmp/nexus-docker-repo.json and /tmp/nexus-create-resp.body are Nexus
#   response captures with no credentials in them, but the always handler
#   removes them anyway to leave a clean pod.

- name: post-install | Configure Nexus (with credential cleanup guarantee)
  block:
    - import_tasks: post_install.yml
  always:
    - name: post-install | Wipe credential temp files inside pod
      command: >
        kubectl -n nexus exec {{ nexus_pod.stdout }} --
        rm -f /tmp/nexus-curl.conf /tmp/nexus-user-body.json
        /tmp/nexus-docker-repo.json /tmp/nexus-create-resp.body
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      failed_when: false
