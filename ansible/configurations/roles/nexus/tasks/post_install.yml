---
# Post-install configuration tasks for Nexus.
#
# Imported from install.yml inside a `block:` whose `always:` clause wipes
# the credential temp files this file creates inside the pod. Anything that
# leaves credentials on the pod's container filesystem MUST live here so
# the cleanup runs even on failure.
#
# All tasks reach the Nexus REST API via `kubectl exec` against the pod's
# `localhost:8081`. Authentication is handled by the curl config file
# `/tmp/nexus-curl.conf` written below — every other API call references it
# with `-K /tmp/nexus-curl.conf`, which keeps the admin password OUT of
# every process argv on both the controller and the worker. The single task
# that needs to know the admin password is the cred-stash task itself, and
# it carries `no_log: true` to prevent ansible from echoing it.
#
# /tmp inside the nexus3 image is on the container rootfs (NOT the Longhorn
# PVC), so any file written here is gone the moment the pod restarts and
# never reaches disk on the storage cluster. Even so, the always-cleanup in
# install.yml wipes the cred file at the end of every run.

- name: post-install | Stash admin creds in pod-local curl config
  # Stream the curl config body via the kubectl exec STDIN pipe so the
  # password is NOT in the kubectl argv on either side. The only argv
  # exposure is the controller-side `/bin/sh -c "<heredoc-script>"`, and
  # ansible's `no_log: true` masks that from logs and console.
  #
  # The single-quoted heredoc delimiter (`'NEXUS_CURL_CONF'`) disables
  # shell variable interpolation in the body — Jinja2 has already
  # substituted `{{ nexus_admin_password }}` at this point and we don't
  # want a `$` in the password string to be re-expanded by the controller's
  # shell.
  shell: |
    set -euo pipefail
    kubectl -n nexus exec -i {{ nexus_pod.stdout }} -- sh -c \
      'umask 077 && cat > /tmp/nexus-curl.conf' <<'NEXUS_CURL_CONF'
    user = "admin:{{ nexus_admin_password }}"
    NEXUS_CURL_CONF
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  no_log: true
  changed_when: false

# --- Realms ----------------------------------------------------------------
# Add the Docker Bearer Token Realm to the active set so docker clients get
# `Bearer realm=...` instead of `BASIC realm=...` in the WWW-Authenticate
# header. Without this, `docker login` against the registry fails even with
# correct credentials because dockerd's auth flow expects bearer tokens.

- name: post-install | Get currently active realms
  command: >
    kubectl -n nexus exec {{ nexus_pod.stdout }} --
    curl -sfS -K /tmp/nexus-curl.conf
    http://localhost:8081/service/rest/v1/security/realms/active
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: active_realms
  changed_when: false

- name: post-install | Activate Docker Bearer Token Realm
  command:
    argv:
      - kubectl
      - -n
      - nexus
      - exec
      - "{{ nexus_pod.stdout }}"
      - --
      - curl
      - -sfS
      - -K
      - /tmp/nexus-curl.conf
      - -X
      - PUT
      - -H
      - Content-Type:application/json
      - -H
      - X-Nexus-UI:true
      - -d
      - "{{ ((active_realms.stdout | from_json) + ['DockerToken']) | unique | to_json }}"
      - http://localhost:8081/service/rest/v1/security/realms/active
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when: '"DockerToken" not in (active_realms.stdout | from_json)'

# --- Docker hosted repository ----------------------------------------------
# Create andusystems-docker if missing, with forceBasicAuth=false (the
# critical setting — it defaults to true in the UI, which is the second
# half of the auth trap above). httpPort 8082 binds the registry connector
# inside the nexus pod, which the nexus-docker Service forwards to.
#
# `nexus_blob_store_name` (default `nexus-blobs`) is the S3 blob store on
# MinIO. On a fresh install, the operator must create this blob store via
# the UI BEFORE the first run of this role — the role does not create the
# blob store itself because the S3 credentials are managed separately and
# blob stores can't be moved or renamed once they hold data, so we don't
# want to risk getting it wrong here. See README step 2.
#
# On a re-run against an existing repo, this task is non-destructive: it
# fetches the current config, only flips forceBasicAuth to false if needed,
# and PUTs back with all other fields preserved (blob store, write policy,
# etc.). That means a previously hand-created repo using the legacy `minio`
# blob store name keeps using it; no migration is forced.

# Blob-store pre-check. The repo create call below returns a 400 with body
# `Blob Store does not exist: <name>` when the configured store is missing,
# and that body used to be invisible because the create task was wrapped in
# no_log. Verify upfront so the operator gets a clear pointer at README
# step 2 instead of a hidden failure.

- name: post-install | List existing Nexus blob stores
  command:
    argv:
      - kubectl
      - -n
      - nexus
      - exec
      - "{{ nexus_pod.stdout }}"
      - --
      - curl
      - -sfS
      - -K
      - /tmp/nexus-curl.conf
      - http://localhost:8081/service/rest/v1/blobstores
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: nexus_blob_stores
  changed_when: false

- name: post-install | Verify required blob store exists
  fail:
    msg: |
      Required Nexus blob store '{{ nexus_blob_store_name }}' does not exist.

      This role intentionally does not create blob stores (see
      apps/nexus/README.md → "First-time setup" step 2 — blob stores can't be
      renamed once they hold data, so they're created by hand). Create an S3
      blob store named '{{ nexus_blob_store_name }}' via the Nexus UI
      (Settings → Repository → Blob Stores → Create) pointing at the MinIO
      'nexus-blobs' bucket, then re-run this role.

      Existing blob stores on this Nexus:
        {{ nexus_blob_stores.stdout | from_json | map(attribute='name') | list | join(', ') }}
  when: nexus_blob_store_name not in (nexus_blob_stores.stdout | from_json | map(attribute='name') | list)

- name: post-install | Get andusystems-docker repo current state
  command: >
    kubectl -n nexus exec {{ nexus_pod.stdout }} --
    curl -s -o /tmp/nexus-docker-repo.json -w "%{http_code}"
    -K /tmp/nexus-curl.conf
    http://localhost:8081/service/rest/v1/repositories/docker/hosted/andusystems-docker
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: docker_repo_check
  changed_when: false

- name: post-install | Create andusystems-docker hosted repo (first time only)
  when: docker_repo_check.stdout == "404"
  block:
    - name: post-install | POST new andusystems-docker hosted repo
      # -K config for creds (no password in argv, so the task can stay
      # visible). -o + -w split body and status: body lands in a temp file
      # inside the pod for the rescue handler to cat, status comes back as
      # this task's stdout for failed_when to gate on.
      command:
        argv:
          - kubectl
          - -n
          - nexus
          - exec
          - "{{ nexus_pod.stdout }}"
          - --
          - curl
          - -sS
          - -K
          - /tmp/nexus-curl.conf
          - -o
          - /tmp/nexus-create-resp.body
          - -w
          - "%{http_code}"
          - -X
          - POST
          - -H
          - Content-Type:application/json
          - -H
          - X-Nexus-UI:true
          - -d
          - "{{ {
              'name': 'andusystems-docker',
              'online': true,
              'storage': {
                'blobStoreName': nexus_blob_store_name,
                'strictContentTypeValidation': true,
                'writePolicy': 'ALLOW',
              },
              'docker': {
                'v1Enabled': false,
                'forceBasicAuth': false,
                'httpPort': 8082,
              },
            } | to_json }}"
          - http://localhost:8081/service/rest/v1/repositories/docker/hosted
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: create_repo_call
      changed_when: create_repo_call.stdout in ["200", "201", "204"]
      failed_when: create_repo_call.stdout not in ["200", "201", "204"]
  rescue:
    - name: post-install | Read Nexus error response body from pod
      command: >
        kubectl -n nexus exec {{ nexus_pod.stdout }} --
        cat /tmp/nexus-create-resp.body
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: nexus_create_error_body
      changed_when: false
      failed_when: false

    - name: post-install | Fail with full Nexus error context
      fail:
        msg: |
          Failed to create andusystems-docker hosted repository.
          Nexus returned HTTP {{ create_repo_call.stdout | default('?') }}.
          Response body:
          {{ nexus_create_error_body.stdout | default('(no body captured)') }}

- name: post-install | Read existing andusystems-docker repo config from pod
  command: >
    kubectl -n nexus exec {{ nexus_pod.stdout }} --
    cat /tmp/nexus-docker-repo.json
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: docker_repo_raw
  changed_when: false
  when: docker_repo_check.stdout == "200"

- name: post-install | Update andusystems-docker repo if forceBasicAuth drifted
  # Non-destructive update: preserves the existing blob store name, write
  # policy, and any other fields by parsing current state and only flipping
  # forceBasicAuth to false. Skipped entirely if forceBasicAuth is already
  # false on the live repo, so re-runs are no-ops.
  command:
    argv:
      - kubectl
      - -n
      - nexus
      - exec
      - "{{ nexus_pod.stdout }}"
      - --
      - curl
      - -sfS
      - -K
      - /tmp/nexus-curl.conf
      - -X
      - PUT
      - -H
      - Content-Type:application/json
      - -H
      - X-Nexus-UI:true
      - -d
      - "{{ ((docker_repo_raw.stdout | from_json) | combine({
          'docker': ((docker_repo_raw.stdout | from_json).docker | combine({'forceBasicAuth': false})),
        }, recursive=true)) | to_json }}"
      - http://localhost:8081/service/rest/v1/repositories/docker/hosted/andusystems-docker
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when:
    - docker_repo_check.stdout == "200"
    - (docker_repo_raw.stdout | from_json).docker.forceBasicAuth | default(false)

# --- Roles -----------------------------------------------------------------
# andusystems-ci-pusher: read+add+edit on the andusystems-docker repo (CI
# build runners use this to push images).
# andusystems-cluster-puller: read-only on the same repo (consuming K8s
# clusters use this for their imagePullSecrets).

- name: post-install | Check if andusystems-ci-pusher role exists
  command: >
    kubectl -n nexus exec {{ nexus_pod.stdout }} --
    curl -sf -o /dev/null -K /tmp/nexus-curl.conf
    http://localhost:8081/service/rest/v1/security/roles/andusystems-ci-pusher
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: ci_pusher_role_check
  failed_when: false
  changed_when: false

- name: post-install | Create andusystems-ci-pusher role
  command:
    argv:
      - kubectl
      - -n
      - nexus
      - exec
      - "{{ nexus_pod.stdout }}"
      - --
      - curl
      - -sfS
      - -K
      - /tmp/nexus-curl.conf
      - -X
      - POST
      - -H
      - Content-Type:application/json
      - -H
      - X-Nexus-UI:true
      - -d
      - "{{ {
          'id': 'andusystems-ci-pusher',
          'name': 'andusystems-ci-pusher',
          'description': 'Push images to andusystems-docker (CI build runners)',
          'privileges': [
            'nx-repository-view-docker-andusystems-docker-read',
            'nx-repository-view-docker-andusystems-docker-add',
            'nx-repository-view-docker-andusystems-docker-edit',
          ],
          'roles': [],
        } | to_json }}"
      - http://localhost:8081/service/rest/v1/security/roles
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when: ci_pusher_role_check.rc != 0

- name: post-install | Check if andusystems-cluster-puller role exists
  command: >
    kubectl -n nexus exec {{ nexus_pod.stdout }} --
    curl -sf -o /dev/null -K /tmp/nexus-curl.conf
    http://localhost:8081/service/rest/v1/security/roles/andusystems-cluster-puller
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: cluster_puller_role_check
  failed_when: false
  changed_when: false

- name: post-install | Create andusystems-cluster-puller role
  command:
    argv:
      - kubectl
      - -n
      - nexus
      - exec
      - "{{ nexus_pod.stdout }}"
      - --
      - curl
      - -sfS
      - -K
      - /tmp/nexus-curl.conf
      - -X
      - POST
      - -H
      - Content-Type:application/json
      - -H
      - X-Nexus-UI:true
      - -d
      - "{{ {
          'id': 'andusystems-cluster-puller',
          'name': 'andusystems-cluster-puller',
          'description': 'Pull images from andusystems-docker (consuming clusters)',
          'privileges': [
            'nx-repository-view-docker-andusystems-docker-read',
            'nx-repository-view-docker-andusystems-docker-browse',
          ],
          'roles': [],
        } | to_json }}"
      - http://localhost:8081/service/rest/v1/security/roles
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when: cluster_puller_role_check.rc != 0

# --- Users -----------------------------------------------------------------
# Both users are created in `active` state (the per-repo trap was that the
# UI defaults the active checkbox in a way that creates them disabled).
# Passwords come from vault.
#
# The Create user tasks below stream the JSON request body (which contains
# the new user's password) through the kubectl exec stdin pipe and into a
# `umask 077` temp file inside the pod, then curl --data-binary @file POSTs
# it. The body file is removed by an `rm` trap on shell exit. This keeps
# the user password OUT of any process argv on either the controller or
# the worker — the only argv exposure is `/bin/sh -c "<heredoc-script>"` on
# the controller, which is shielded by no_log on those tasks.

- name: post-install | Check if ci-pusher user exists
  command: >
    kubectl -n nexus exec {{ nexus_pod.stdout }} --
    curl -sf -K /tmp/nexus-curl.conf
    http://localhost:8081/service/rest/v1/security/users?source=default
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: users_check
  changed_when: false

- name: post-install | Compute existing usernames
  set_fact:
    nexus_existing_users: "{{ users_check.stdout | from_json | map(attribute='userId') | list }}"

- name: post-install | Create ci-pusher user
  shell: |
    set -euo pipefail
    kubectl -n nexus exec -i {{ nexus_pod.stdout }} -- sh -c '
      umask 077
      trap "rm -f /tmp/nexus-user-body.json" EXIT
      cat > /tmp/nexus-user-body.json
      curl -sfS -K /tmp/nexus-curl.conf -X POST \
        -H "Content-Type: application/json" \
        -H "X-Nexus-UI: true" \
        --data-binary @/tmp/nexus-user-body.json \
        http://localhost:8081/service/rest/v1/security/users
    ' <<'NEXUS_USER_BODY'
    {{ {
      'userId': nexus_ci_pusher_user,
      'firstName': 'CI',
      'lastName': 'Pusher',
      'emailAddress': 'admin@andusystems.com',
      'password': nexus_ci_pusher_password,
      'status': 'active',
      'roles': ['andusystems-ci-pusher'],
    } | to_json }}
    NEXUS_USER_BODY
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when: nexus_ci_pusher_user not in nexus_existing_users
  no_log: true

- name: post-install | Ensure ci-pusher user is active
  # Even if the user already existed (created by hand or by a previous run
  # that didn't set status), force status=active. The PUT preserves the
  # password — the password subresource is the only way to change passwords
  # via the API. Re-runs of this task are no-ops if already active. The
  # body has no secrets (no password field), so this task can stay visible.
  command:
    argv:
      - kubectl
      - -n
      - nexus
      - exec
      - "{{ nexus_pod.stdout }}"
      - --
      - curl
      - -sfS
      - -K
      - /tmp/nexus-curl.conf
      - -X
      - PUT
      - -H
      - Content-Type:application/json
      - -H
      - X-Nexus-UI:true
      - -d
      - "{{ {
          'userId': nexus_ci_pusher_user,
          'firstName': 'CI',
          'lastName': 'Pusher',
          'emailAddress': 'admin@andusystems.com',
          'source': 'default',
          'status': 'active',
          'roles': ['andusystems-ci-pusher'],
        } | to_json }}"
      - "http://localhost:8081/service/rest/v1/security/users/{{ nexus_ci_pusher_user }}"
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: post-install | Create cluster-puller user
  shell: |
    set -euo pipefail
    kubectl -n nexus exec -i {{ nexus_pod.stdout }} -- sh -c '
      umask 077
      trap "rm -f /tmp/nexus-user-body.json" EXIT
      cat > /tmp/nexus-user-body.json
      curl -sfS -K /tmp/nexus-curl.conf -X POST \
        -H "Content-Type: application/json" \
        -H "X-Nexus-UI: true" \
        --data-binary @/tmp/nexus-user-body.json \
        http://localhost:8081/service/rest/v1/security/users
    ' <<'NEXUS_USER_BODY'
    {{ {
      'userId': nexus_cluster_puller_user,
      'firstName': 'Cluster',
      'lastName': 'Puller',
      'emailAddress': 'admin@andusystems.com',
      'password': nexus_cluster_puller_password,
      'status': 'active',
      'roles': ['andusystems-cluster-puller'],
    } | to_json }}
    NEXUS_USER_BODY
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when: nexus_cluster_puller_user not in nexus_existing_users
  no_log: true

- name: post-install | Ensure cluster-puller user is active
  command:
    argv:
      - kubectl
      - -n
      - nexus
      - exec
      - "{{ nexus_pod.stdout }}"
      - --
      - curl
      - -sfS
      - -K
      - /tmp/nexus-curl.conf
      - -X
      - PUT
      - -H
      - Content-Type:application/json
      - -H
      - X-Nexus-UI:true
      - -d
      - "{{ {
          'userId': nexus_cluster_puller_user,
          'firstName': 'Cluster',
          'lastName': 'Puller',
          'emailAddress': 'admin@andusystems.com',
          'source': 'default',
          'status': 'active',
          'roles': ['andusystems-cluster-puller'],
        } | to_json }}"
      - "http://localhost:8081/service/rest/v1/security/users/{{ nexus_cluster_puller_user }}"
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false
