---
- name: Create minio namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: minio
  environment:
    KUBECONFIG: "{{ kubeconfig }}"

- name: Apply Manifest
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', repo_root + '/apps/minio/manifest.yml') | from_yaml_all | list }}"
  environment:
    KUBECONFIG: "{{ kubeconfig }}"