# apps/nexus/manifests/ingress.yml
#
# Traefik IngressRoutes for Nexus. Two access patterns share these routes:
#
#   1. PUBLIC PATH — through Pangolin
#      client → https://nexus.andusystems.com  (Pangolin terminates TLS)
#             → http://<storage-traefik-lb>:80 (Pangolin → storage Traefik)
#             → Host header routing
#             → nexus / nexus-docker Services (plain HTTP, ports 8081/8082)
#      Pangolin handles the public-facing TLS, so the storage Traefik leg
#      from Pangolin is HTTP. The X-Forwarded-Proto: https middleware below
#      tells Nexus the original client request was HTTPS, which Nexus uses
#      when generating self-referential URLs (critically: docker registry
#      bearer realm URLs — without it, Nexus emits http:// realm URLs that
#      cause docker login redirect loops).
#
#   2. INTERNAL PATH — direct from other clusters' pods
#      runner pod → https://10.238.40.21:443  (with hostAliases pinning
#                                               registry.andusystems.com)
#                 → storage Traefik websecure entrypoint
#                 → nexus-docker-tls IngressRoute → nexus-docker:8082
#      buildkit / containerd / any client that does TLS validation will
#      reject a self-signed cert here, so the websecure leg uses the real
#      Let's Encrypt cert from cert.yml (secretName: nexus-tls).
#
# Pangolin must be configured with two private resources, one per public
# hostname, both pointing at the storage Traefik LoadBalancer IP.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nexus-forwarded-proto-https
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: ingress-middleware
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
# Nexus UI / REST API
#
# Listens on BOTH `web` (HTTP) and `websecure` (HTTPS) entrypoints. Pangolin
# forwards HTTPS to its internal target (storage Traefik) even though TLS is
# already terminated at the Pangolin edge. The websecure leg uses the real
# nexus-tls cert from cert.yml so any direct in-cluster client that hits
# this hostname over HTTPS gets a valid chain.
#
# Note: with `tls.secretName` set, Traefik treats this IngressRoute as
# TLS-only — the `web` (HTTP) entrypoint listed above is silently skipped
# in favour of websecure. That means the Pangolin → Traefik leg actually
# has to be HTTPS (which it is — Pangolin forwards HTTPS internally even
# though it terminates the public-facing TLS at its edge).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexus-ui
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: ingress-ui
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`nexus.andusystems.com`)
      kind: Rule
      middlewares:
        - name: nexus-forwarded-proto-https
          namespace: nexus
      services:
        - name: nexus
          port: 8081
  tls:
    secretName: nexus-tls
---
# Nexus Docker hosted-repo connector
#
# SPLIT INTO TWO INGRESSROUTES because Traefik treats an IngressRoute with
# `tls: {}` as TLS-only — it ONLY matches on entrypoints that have TLS
# configured (websecure). The web (HTTP) entrypoint is silently skipped.
# That breaks docker push, because the docker daemon's `insecure-registries`
# config falls back to plain HTTP, hits the web entrypoint, and gets a 404
# from Traefik because no IngressRoute matches there.
#
# We need both:
#   - Plain HTTP on `web`     → for `docker push` from workstations with
#                                insecure-registries config
#   - TLS on `websecure`      → for the Pangolin → Traefik leg, since
#                                Pangolin forwards HTTPS internally
#
# Note: the registry port (8082 inside the nexus pod) only opens after a
# Docker hosted repository is created in the Nexus UI and bound to that
# port. Until then both routes return connection-refused. See
# apps/nexus/README.md step 5 of post-install setup.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexus-docker
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: ingress-docker
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`registry.andusystems.com`)
      kind: Rule
      middlewares:
        - name: nexus-forwarded-proto-https
          namespace: nexus
      services:
        - name: nexus-docker
          port: 8082
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nexus-docker-tls
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: ingress-docker-tls
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`registry.andusystems.com`)
      kind: Rule
      middlewares:
        - name: nexus-forwarded-proto-https
          namespace: nexus
      services:
        - name: nexus-docker
          port: 8082
  # Use the real Let's Encrypt cert (cert.yml) instead of Traefik's
  # self-signed default. buildkit / containerd / any client that performs
  # TLS validation needs this when pulling/pushing from inside another
  # cluster (e.g. the GitHub Actions runner pods on the management cluster).
  tls:
    secretName: nexus-tls
