# Loki — log aggregation system for the storage cluster.
# Runs in single-binary mode backed by MinIO (S3-compatible) for object storage.
fullnameOverride: storage-loki

loki:
  commonConfig:
    replication_factor: 1   # Single binary mode, no replication needed
  storage:
    type: s3
    bucketNames:
      chunks: loki-data
      ruler: loki-ruler
    s3:
      endpoint: http://minio.minio.svc.cluster.local:9000
      bucketnames: loki-data
      region: us-east-1
      s3ForcePathStyle: true
      insecure: true
  auth_enabled: false       # No multi-tenancy; all logs go to a single tenant
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 30d           # Logs older than 30 days are automatically deleted
    ingestion_rate_mb: 8            # Per-tenant ingest rate limit (MB/s)
    ingestion_burst_size_mb: 16     # Maximum burst size above the steady ingest rate
    max_query_parallelism: 8        # Max concurrent sub-queries per query
  rulerConfig:
    storage:
      type: s3
      s3:
        endpoint: http://minio.minio.svc.cluster.local:9000
        bucketnames: loki-ruler
        region: us-east-1
        s3ForcePathStyle: true
        insecure: true

# Single-binary deployment — all Loki components (ingester, querier, compactor) in one process
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi
  # MinIO S3 credentials injected from a Kubernetes secret
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: loki-minio-credentials
          key: rootUser
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-minio-credentials
          key: rootPassword
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

# Disable distributed components — single binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Gateway disabled — clients connect to Loki directly, not via an nginx gateway
gateway:
  enabled: false

# Disable built-in self-monitoring (Alloy handles observability for Loki instead)
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

# Expose Loki metrics to Prometheus via a ServiceMonitor
serviceMonitor:
  enabled: true

# LoadBalancer service allows access from other clusters on the network
service:
  type: LoadBalancer
